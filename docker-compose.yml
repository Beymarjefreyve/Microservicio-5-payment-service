version: "3.9"

services:
  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "8008:8008"
    env_file:
      - .env
    environment:
      SERVER_PORT: 8008
      DATABASE_URL: ${DATABASE_URL}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://localhost:8007/api/notifications}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8008/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
